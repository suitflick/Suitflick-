<section class="checkout">

<h2>Checkout</h2>
<div class="security-box">
<h3>🔒 Security Notice</h3>
<p>
Your order will be verified before dispatch.
Please complete payment only after order confirmation.
</p>
</div>

<br>

<form>

<label>Full Name</label><br>
<input type="text" placeholder="Enter your full name" required>

<br><br>

<label>Mobile Number</label><br>
<input type="tel" placeholder="Enter your mobile number" required>

<br><br>

<label>Email</label><br>
<input type="email" placeholder="Enter your email">

<br><br>

<label>Delivery Address</label><br>
<textarea placeholder="Enter your full address" rows="4" required></textarea>

<br><br>

<label>Pincode</label><br>
<input type="number" placeholder="Enter Pincode" required>

<br><br>

<label>Payment Method</label><br>

<label>Payment Mode</label><br>

<select id="paymentMode">

<option value="">Select Payment Mode</option>

<option value="prepaid">
Prepaid (Full Payment - Free Delivery)
</option>

<option value="cod">
Cash on Delivery (₹200 Advance Required)
</option>

</select>

<div id="paymentMessage"></div>

<br><br>

<button type="submit">
Proceed to Payment 
</button>

</form>

</section>

<script type="module" src="checkout.js"></script>
