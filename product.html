<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Product Details | SuitFlick</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>

<div class="logo">SuitFlick</div>

<nav>
<a href="index.html">Home</a>
<a href="shop.html">Shop</a>
<a href="wishlist.html">Wishlist</a>
<a href="cart.html">Cart</a>
<a href="account.html">Account</a>
<a href="contact.html">Contact</a>
<a href="admin.html">Admin</a>
</nav>

</header>

<section class="product-details">

<div class="product-image">
<img id="productImage" src="" alt="Product">
</div>

<div class="product-info">

<h2 id="productName"></h2>

<h3 id="productPrice"></h3>

<p>⭐⭐⭐⭐☆ (4.5/5)</p>

<p>
Premium Quality Women's Suit with Soft Fabric and Elegant Design.
</p>

<h4>Select Size</h4>

<select id="size">
<option>S</option>
<option>M</option>
<option>L</option>
<option>XL</option>
</select>

<br><br>

<h4>Quantity</h4>

<input
type="number"
id="qty"
value="1"
min="1"
max="10">

<br><br>

<button id="cartBtn">
Add To Cart
</button>

<button onclick="location.href='checkout.html'">
Buy Now
</button>

</div>

</section>

<script src="script.js"></script>

<script>

const products = {

1:{
name:"Floral Cotton Suit",
price:999,
image:"https://via.placeholder.com/400x500?text=Floral+Suit"
},

2:{
name:"Party Wear Suit",
price:1499,
image:"https://via.placeholder.com/400x500?text=Party+Wear"
},

3:{
name:"Anarkali Suit",
price:1999,
image:"https://via.placeholder.com/400x500?text=Anarkali"
}

};

let id = new URLSearchParams(window.location.search).get("id");

if(!id){
id = "1";
}

let product = products[id];

document.getElementById("productName").innerHTML = product.name;

document.getElementById("productPrice").innerHTML = "₹" + product.price;

document.getElementById("productImage").src = product.image;

document.getElementById("cartBtn").onclick = function(){

let qty = parseInt(document.getElementById("qty").value);

for(let i=0;i<qty;i++){

addToCart(product.name,product.price);

}

alert("Product Added Successfully 🛒");

};

</script>

</body>
</html>
