<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Myntra Clone</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <a href="#" class="logo">Myntra</a>
        <nav>
            <a href="#">Men</a>
            <a href="#">Women</a>
            <a href="#">Kids</a>
        </nav>
    </header>

    <main>
        <h2>Trending Fashion</h2>
        <div class="product-container">
            
            <div class="product-card">
                <div class="image-placeholder">T-Shirt Image</div>
                <div class="product-details">
                    <h4>Casual Pink T-Shirt</h4>
                    <p>₹499</p>
                </div>
                <button class="btn-add">Add to Bag</button>
            </div>

            <div class="product-card">
                <div class="image-placeholder">Dress Image</div>
                <div class="product-details">
                    <h4>Summer Dress</h4>
                    <p>₹999</p>
                </div>
                <button class="btn-add">Add to Bag</button>
            </div>

        </div>
    </main>

</body>
</html>
