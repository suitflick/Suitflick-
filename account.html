<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Login | SuitFlick</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<header>

<div class="logo">SuitFlick Admin</div>

<nav>
<a href="index.html">Home</a>
<a href="shop.html">Shop</a>
<a href="contact.html">Contact</a>
</nav>

</header>

<section class="account">

<h2>Admin Login</h2>

<div id="loginBox">

<form id="adminLoginForm">

<input
type="email"
id="adminEmail"
placeholder="Admin Email"
required>

<br><br>

<input
type="password"
id="adminPassword"
placeholder="Password"
required>

<br><br>

<button type="submit">
🔐 Login
</button>

</form>

<br>

<button id="forgotPasswordBtn">
Forgot Password
</button>

<br><br>

<button id="logoutBtn">
Logout
</button>

</div>

</section>

<script type="module" src="account.js"></script>

</body>
</html>
