<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SuitFlick Admin Panel</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<header>

<div class="logo">SuitFlick Admin</div>

<nav>

<a href="index.html">Home</a>

<a href="shop.html">Shop</a>

<a href="contact.html">Contact</a>

</nav>

</header>

<section class="account">

<h2>Admin Dashboard</h2>

<p style="text-align:center;color:#666;margin-bottom:25px;">
Add New Product
</p>

<label>Product Name</label>

<input
type="text"
id="productName"
placeholder="Women's Suit Name">

<br><br>

<label>Price (₹)</label>

<input
type="number"
id="productPrice"
placeholder="Product Price">

<br><br>

<label>Category</label>

<select id="productCategory">

<option>Anarkali Suit</option>

<option>Kurta Set</option>

<option>Cotton Suit</option>

<option>Sharara Set</option>

<option>Party Wear</option>

</select>

<br><br>

<label>Brand</label>

<input
type="text"
id="productBrand"
value="SuitFlick">

<br><br>

<label>Fabric</label>

<input
type="text"
id="productFabric"
placeholder="Cotton / Rayon / Silk">

<br><br>

<label>Color</label>

<input
type="text"
id="productColor"
placeholder="Pink, Black, Green">

<br><br>

<label>Stock Quantity</label>

<input
type="number"
id="productStock"
placeholder="Available Stock">

<br><br>

<label>Main Image URL</label>

<input
type="text"
id="productImage1"
placeholder="https://...">

<br><br>

<label>Image 2 URL</label>

<input
type="text"
id="productImage2"
placeholder="https://...">

<br><br>

<label>Image 3 URL</label>

<input
type="text"
id="productImage3"
placeholder="https://...">

<br><br>

<label>Image 4 URL</label>

<input
type="text"
id="productImage4"
placeholder="https://...">

<br><br>

<label>Image 5 URL</label>

<input
type="text"
id="productImage5"
placeholder="https://...">

<br><br>

<label>Available Sizes</label>

<input
type="text"
id="productSizes"
value="XS,S,M,L,XL,XXL">

<br><br>

<label>Delivery Time</label>

<input
type="text"
id="delivery"
value="3-7 Business Days">

<br><br>

<label>Wash Care</label>

<input
type="text"
id="wash"
value="Gentle Machine Wash">

<br><br>

<label>Product Description</label>

<textarea

id="productDescription"

rows="6"

placeholder="Enter Product Description"

></textarea>

<br><br>

<button id="addProductBtn">

➕ Add Product

</button>

<p id="message"></p>

<hr>

<h2>Products List</h2>

<div id="productsList">

Loading Products...

</div>

</section>

<script type="module">

import { db } from "./firebase.js";

import {

collection,

addDoc,

getDocs,

deleteDoc,

doc,

query,

orderBy

} from "https://www.gstatic.com/firebasejs/12.16.0/firebase-firestore.js";

const btn=document.getElementById("addProductBtn");

btn.addEventListener("click",async()=>{

const name=document.getElementById("productName").value.trim();

const price=Number(document.getElementById("productPrice").value);

const category=document.getElementById("productCategory").value;

const brand=document.getElementById("productBrand").value.trim();

const fabric=document.getElementById("productFabric").value.trim();

const color=document.getElementById("productColor").value.trim();

const stock=Number(document.getElementById("productStock").value);

const image1=document.getElementById("productImage1").value.trim();

const image2=document.getElementById("productImage2").value.trim();

const image3=document.getElementById("productImage3").value.trim();

const image4=document.getElementById("productImage4").value.trim();

const image5=document.getElementById("productImage5").value.trim();

const sizes=document.getElementById("productSizes").value;

const delivery=document.getElementById("delivery").value;

const wash=document.getElementById("wash").value;

const description=document.getElementById("productDescription").value.trim();

if(

!name ||

!price ||

!image1 ||

!description

){

alert("Please fill all required fields.");

return;

}

try{

await addDoc(collection(db,"products"),{

name,

price,

category,

brand,

fabric,

color,

stock,

image:image1,

images:[

image1,

image2,

image3,

image4,

image5

],

sizes,

delivery,

wash,

description,

createdAt:new Date()

});

document.getElementById("message").innerHTML="✅ Product Added Successfully";

document.getElementById("productName").value="";

document.getElementById("productPrice").value="";

document.getElementById("productFabric").value="";

document.getElementById("productColor").value="";

document.getElementById("productStock").value="";

document.getElementById("productImage1").value="";

document.getElementById("productImage2").value="";

document.getElementById("productImage3").value="";

document.getElementById("productImage4").value="";

document.getElementById("productImage5").value="";

document.getElementById("productDescription").value="";

loadProducts();

}catch(err){

alert(err.message);

}
});

async function loadProducts(){

const list=document.getElementById("productsList");

list.innerHTML="Loading Products...";

try{

const q=query(collection(db,"products"),orderBy("createdAt","desc"));

const snapshot=await getDocs(q);

list.innerHTML="";

snapshot.forEach((item)=>{

const product=item.data();

list.innerHTML+=`

<div class="product-card">

<img
src="${product.image}"
style="width:120px;height:150px;object-fit:cover;border-radius:8px;">

<h3>${product.name}</h3>

<p><b>₹${product.price}</b></p>

<p>Category : ${product.category}</p>

<p>Brand : ${product.brand}</p>

<p>Fabric : ${product.fabric}</p>

<p>Color : ${product.color}</p>

<p>Stock : ${product.stock}</p>

<p>Sizes : ${product.sizes}</p>

<button
onclick="deleteProduct('${item.id}')"
style="background:#ff3f6c;color:white;border:none;padding:10px 15px;border-radius:8px;cursor:pointer;margin-top:10px;">

🗑 Delete Product

</button>

</div>

`;

});

}catch(error){

console.log(error);

list.innerHTML="<h3>❌ Unable to Load Products</h3>";

}

}

window.deleteProduct=async(id)=>{

const ok=confirm("Are you sure you want to delete this product?");

if(!ok) return;

try{

await deleteDoc(doc(db,"products",id));

alert("✅ Product Deleted Successfully");

loadProducts();

}catch(error){

alert(error.message);

}

};

loadProducts();

</script>

</body>

</html>
