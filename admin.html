
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Panel | SuitFlick</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>

<div class="logo">SuitFlick Admin</div>

<nav>
<a href="index.html">Home</a>
<a href="shop.html">Shop</a>
<a href="wishlist.html">Wishlist</a>
<a href="cart.html">Cart</a>
<a href="account.html">Account</a>
<a href="contact.html">Contact</a>
</nav>

</header>

<section class="account">

<h2>Add New Product</h2>

<input
type="text"
id="productName"
placeholder="Product Name">

<br><br>

<input
type="number"
id="productPrice"
placeholder="Product Price">

<br><br>

<input
type="text"
id="productImage"
placeholder="Product Image URL">

<br><br>

<textarea
id="productDescription"
placeholder="Product Description"
rows="4">
</textarea>

<br><br>

<button id="addProductBtn">
Add Product
</button>

<p id="message"></p>

</section>

<script type="module">

import { db } from "./firebase.js";

import {
collection,
addDoc
} from "https://www.gstatic.com/firebasejs/12.16.0/firebase-firestore.js";

document.getElementById("addProductBtn").onclick = async function(){

let name = document.getElementById("productName").value;

let price = Number(document.getElementById("productPrice").value);

let image = document.getElementById("productImage").value;

let description =
document.getElementById("productDescription").value;

if(name==="" || price==="" || image===""){

alert("Please fill all fields");

return;

}

try{

await addDoc(collection(db,"products"),{

name:name,

price:price,

image:image,

description:description

});

document.getElementById("message").innerHTML="✅ Product Added Successfully";

document.getElementById("productName").value="";

document.getElementById("productPrice").value="";

document.getElementById("productImage").value="";

document.getElementById("productDescription").value="";

}catch(error){

alert(error);

}

};

</script>

</body>
</html>
