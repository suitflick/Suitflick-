<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>SuitFlick Admin Panel</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<header>

<div class="logo">
SuitFlick Admin
</div>

<div class="menu-icon"
onclick="toggleMenu()">
☰
</div>

<nav id="navbar">

<a href="index.html">
Home
</a>

<a href="shop.html">
Shop
</a>

<a href="admin.html">
Admin
</a>

<a href="orders.html">
Orders
</a>

</nav>

</header>

<section class="admin">

<h2>
Product Management
</h2>

<input
type="text"
id="productName"
placeholder="Product Name">

<select id="category">

<option value="">
Select Category
</option>

<option>
Suit
</option>

<option>
Saree
</option>

<option>
Lehenga
</option>

</select>

<input
type="number"
id="price"
placeholder="Original Price">

<input
type="number"
id="offerPrice"
placeholder="Offer Price">

<select id="badge">

<option value="">
Select Badge
</option>

<option>
NEW
</option>

<option>
SALE
</option>

<option>
BEST SELLER
</option>

</select>

<select id="color">

<option>
Red
</option>

<option>
Pink
</option>

<option>
Black
</option>

<option>
Blue
</option>

<option>
Green
</option>

<option>
Yellow
</option>

<option>
White
</option>

<option>
Maroon
</option>

<option>
Purple
</option>

</select>

<select id="fabric">

<option>
Cotton
</option>

<option>
Rayon
</option>

<option>
Silk
</option>

<option>
Georgette
</option>

<option>
Chiffon
</option>

<option>
Organza
</option>

<option>
Velvet
</option>

</select>

<select id="sleeve">

<option>
Sleeveless
</option>

<option>
Half Sleeve
</option>

<option>
3/4 Sleeve
</option>

<option>
Full Sleeve
</option>

</select>

<select id="neck">

<option>
Round Neck
</option>

<option>
V Neck
</option>

<option>
Boat Neck
</option>

<option>
Square Neck
</option>

<option>
Collar Neck
</option>

</select>

<input
type="number"
id="stock"
placeholder="Available Stock">

<textarea
id="description"
placeholder="Product Description"
rows="5">
</textarea>

<h3>Available Sizes</h3>

<div class="sizes">

<label><input type="checkbox" value="XS"> XS</label>

<label><input type="checkbox" value="S"> S</label>

<label><input type="checkbox" value="M"> M</label>

<label><input type="checkbox" value="L"> L</label>

<label><input type="checkbox" value="XL"> XL</label>

<label><input type="checkbox" value="XXL"> XXL</label>

</div>

<h3>Product Images</h3>

<input
type="text"
id="image1"
placeholder="Image 1 URL">

<input
type="text"
id="image2"
placeholder="Image 2 URL">

<input
type="text"
id="image3"
placeholder="Image 3 URL">

<input
type="text"
id="image4"
placeholder="Image 4 URL">

<input
type="text"
id="image5"
placeholder="Image 5 URL">

<input
type="text"
id="image6"
placeholder="Image 6 URL">

<br><br>

<button id="addProductBtn">

➕ Add Product

</button>

<button id="updateProductBtn">

✏️ Update Product

</button>

<button id="resetFormBtn">

🔄 Reset Form

</button>

</section>
