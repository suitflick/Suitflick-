<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shop | SuitFlick</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
<div class="logo">SuitFlick</div>

<nav>
<a href="index.html">Home</a>
<a href="shop.html">Shop</a>
<a href="wishlist.html">Wishlist</a>
<a href="cart.html">Cart</a>
<a href="account.html">Account</a>
<a href="contact.html">Contact</a>
<a href="admin.html">Admin</a>
</nav>
</header>

<section class="products">

<h2>Women's Collection</h2>

<input
type="text"
id="searchInput"
class="search"
placeholder="Search Products..."
onkeyup="searchProducts()">

<div class="product-grid">

<div class="product-card">
<img src="https://via.placeholder.com/300x400?text=Floral+Suit" alt="Floral Cotton Suit">
<h3>Floral Cotton Suit</h3>
<p>₹999</p>
<button onclick="addToWishlist('Floral Cotton Suit',999)">
♡ Wishlist
</button>
<button onclick="addToCart('Floral Cotton Suit',999)">Add to Cart</button>
<button onclick="window.location.href='product.html?id=1'">
View Details
</button>
</div>

<div class="product-card">
<img src="https://via.placeholder.com/300x400?text=Party+Suit" alt="Party Wear Suit">
<h3>Party Wear Suit</h3>
<p>₹1499</p>
<button onclick="addToWishlist('Party Wear Suit',1499)">
♡ Wishlist
</button>
<button onclick="addToCart('Party Wear Suit',1499)">Add to Cart</button>
<button onclick="window.location.href='product.html?id=2'">
View Details
</button>
</div>

<div class="product-card">
<img src="https://via.placeholder.com/300x400?text=Anarkali+Suit" alt="Anarkali Suit">
<h3>Anarkali Suit</h3>
<p>₹1999</p>
<button onclick="addToWishlist('Anarkali Suit',1999)">
♡ Wishlist
</button>
<button onclick="addToCart('Anarkali Suit',1999)">Add to Cart</button>
<button onclick="window.location.href='product.html?id=3'">
View Details
</button>
</div>

</div>

</section>

<script src="script.js"></script>

</body>
</html>
